name: Build and Deploy Next to VPS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create environment file
        run: |
          echo "NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}" >> .env.production
          echo "API_TIMEOUT=${{ secrets.API_TIMEOUT }}" >> .env.production
          echo "NEXT_STORAGE_HOST=${{ secrets.NEXT_STORAGE_HOST }}" >> .env.production
          echo "NEXT_STORAGE_PORT=${{ secrets.NEXT_STORAGE_PORT }}" >> .env.production
          echo "NEXT_PUBLIC_DOMAIN_URL=${{ secrets.NEXT_PUBLIC_DOMAIN_URL }}" >> .env.production

      - name: Build application
        run: yarn build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          API_TIMEOUT: ${{ secrets.API_TIMEOUT }}
          NEXT_STORAGE_HOST: ${{ secrets.NEXT_STORAGE_HOST }}
          NEXT_STORAGE_PORT: ${{ secrets.NEXT_STORAGE_PORT }}
          NEXT_PUBLIC_DOMAIN_URL: ${{ secrets.NEXT_PUBLIC_DOMAIN_URL }}

      - name: Create deployment package
        run: |
          mkdir -p deployment
          cp -r .next deployment/
          cp -r public deployment/
          cp package.json deployment/
          cp yarn.lock deployment/
          cp next.config.ts deployment/
          cp ecosystem.config.js deployment/
          cp .env.production deployment/
          tar -czf deployment.tar.gz -C deployment .

      - name: Deploy to Alibaba Cloud VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Create application directory if it doesn't exist
            sudo mkdir -p /var/www/spa
            sudo chown $USER:$USER /var/www/spa

            # Stop the application if it's running with PM2
            pm2 stop spa || true

            # Clean existing deployment but keep node_modules
            rm -rf /var/www/spa/*

      - name: Copy deployment package to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: 'deployment.tar.gz'
          target: '/var/www/spa/'

      - name: Extract and setup application on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/spa

            # Extract deployment package
            tar -xzf deployment.tar.gz
            rm deployment.tar.gz

            echo "Installing dependencies on VPS..."
            yarn install --production --frozen-lockfile

            # Set proper permissions
            sudo chown -R $USER:$USER /var/www/spa
            sudo chmod -R 755 /var/www/spa

            # Install TypeScript and wait for completion
            echo "Installing TypeScript..."
            yarn add -D --exact typescript
            echo "TypeScript installation completed"

            # Start the application with PM2
            pm2 start ecosystem.config.js
            pm2 save

            # Check application status
            sleep 5
            pm2 status
